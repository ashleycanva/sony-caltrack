<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0C2E52" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CalTrack" />
  <title>CalTrack — Sony's Calorie Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #185FA5;
      --navy-dark: #0C447C;
      --navy-deeper: #0C2E52;
      --navy-light: #B5D4F4;
      --navy-pale: #E6F1FB;
      --gold: #EF9F27;
      --gold-dark: #BA7517;
      --gold-light: #FAC775;
      --gold-pale: #FAEEDA;
      --bg: #081828;
      --surface: #0C2243;
      --surface2: #122D52;
      --text: #E8F2FC;
      --text-muted: #7BA8D4;
      --border: rgba(180,210,244,0.12);
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --radius: 16px;
      --radius-sm: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      padding-bottom: 90px;
      overscroll-behavior: none;
    }
    /* ── Header ── */
    .header {
      padding: 52px 20px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
    .greeting { font-size: 13px; color: var(--text-muted); letter-spacing: 0.3px; }
    .username { font-size: 22px; font-weight: 600; color: var(--text); margin-top: 2px; }
    .settings-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted);
      font-size: 18px; transition: background 0.2s;
    }
    .settings-btn:hover { background: var(--navy-dark); color: var(--text); }
    /* ── Ring ── */
    .ring-section {
      display: flex; align-items: center; gap: 20px;
      padding: 20px 20px 16px;
      background: var(--surface);
    }
    .ring-wrap { position: relative; flex-shrink: 0; }
    .ring-wrap svg { display: block; }
    .ring-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-pct { font-size: 20px; font-weight: 600; color: var(--gold); font-family: var(--mono); }
    .ring-info { flex: 1; }
    .cal-consumed { font-size: 32px; font-weight: 600; color: var(--text); font-family: var(--mono); line-height: 1; }
    .cal-unit { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .cal-remaining {
      margin-top: 10px; font-size: 13px;
      display: flex; align-items: center; gap: 6px;
    }
    .rem-pill {
      background: var(--gold-pale); color: var(--gold-dark);
      font-size: 12px; font-weight: 600; padding: 2px 8px;
      border-radius: 20px;
    }
    .rem-text { color: var(--text-muted); font-size: 12px; }
    /* ── Macros ── */
    .macros {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; padding: 16px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .macro-card {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 10px 12px; text-align: center;
    }
    .macro-val { font-size: 16px; font-weight: 600; color: var(--navy-light); font-family: var(--mono); }
    .macro-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .macro-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .macro-fill { height: 100%; border-radius: 2px; background: var(--navy); }
    /* ── Meals ── */
    .section { padding: 20px 20px 0; }
    .section-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 12px;
    }
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .meal-count { font-size: 12px; color: var(--text-muted); }
    .meal-list { display: flex; flex-direction: column; gap: 8px; }
    .meal-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .meal-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
    }
    .meal-name { flex: 1; font-size: 14px; color: var(--text); }
    .meal-cal { font-size: 14px; font-weight: 600; color: var(--gold); font-family: var(--mono); }
    .meal-delete {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 16px; padding: 2px 4px;
      border-radius: 4px; transition: color 0.2s;
      line-height: 1;
    }
    .meal-delete:hover { color: #E24B4A; }
    .empty-state {
      text-align: center; padding: 32px 20px;
      color: var(--text-muted); font-size: 14px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.4; }
    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 20px 28px;
      display: flex; gap: 10px;
    }
    .log-btn {
      flex: 1; background: var(--gold);
      color: #1a0d00; border: none;
      border-radius: var(--radius-sm); padding: 14px;
      font-size: 15px; font-weight: 600;
      font-family: var(--font); cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .log-btn:hover { background: var(--gold-light); }
    .log-btn:active { transform: scale(0.98); }
    /* ── Modal ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 430px;
      border-top: 1px solid var(--border);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border); margin: 0 auto 20px;
    }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
    .input-group { margin-bottom: 14px; }
    .input-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-field {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 14px; color: var(--text);
      font-size: 15px; font-family: var(--font);
      outline: none; transition: border-color 0.2s;
    }
    .input-field:focus { border-color: var(--gold); }
    .input-field::placeholder { color: var(--text-muted); }
    .quick-foods { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
    .quick-chip {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .quick-chip:hover { border-color: var(--gold); color: var(--gold); }
    .modal-add-btn {
      width: 100%; background: var(--navy);
      color: var(--text); border: none;
      border-radius: var(--radius-sm); padding: 14px;
      font-size: 15px; font-weight: 600;
      font-family: var(--font); cursor: pointer;
      transition: background 0.2s;
    }
    .modal-add-btn:hover { background: var(--navy-dark); }
    /* ── Settings Modal ── */
    .settings-modal {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 430px;
      border-top: 1px solid var(--border);
      animation: slideUp 0.3s ease;
    }
    .goal-display {
      text-align: center; padding: 20px 0;
      font-size: 48px; font-weight: 600;
      color: var(--gold); font-family: var(--mono);
    }
    .goal-sub { text-align: center; font-size: 13px; color: var(--text-muted); margin-top: -12px; margin-bottom: 20px; }
    .goal-slider { width: 100%; margin: 16px 0; accent-color: var(--gold); }
    .goal-range-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); }
    .date-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--navy-pale); color: var(--navy-dark);
      font-size: 12px; font-weight: 500; padding: 4px 10px;
      border-radius: 20px; margin-bottom: 16px;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="greeting" id="greeting">Good morning,</div>
      <div class="username">Sony 👋</div>
    </div>
    <button class="settings-btn" onclick="openSettings()" aria-label="Settings">⚙</button>
  </div>
</div>

<!-- Ring + Calories -->
<div class="ring-section">
  <div class="ring-wrap">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(180,210,244,0.12)" stroke-width="10"/>
      <circle id="ring-arc" cx="50" cy="50" r="40" fill="none" stroke="#EF9F27"
        stroke-width="10" stroke-linecap="round"
        stroke-dasharray="251.3" stroke-dashoffset="251.3"
        transform="rotate(-90 50 50)" style="transition: stroke-dashoffset 0.6s ease"/>
    </svg>
    <div class="ring-center">
      <span class="ring-pct" id="ring-pct">0%</span>
    </div>
  </div>
  <div class="ring-info">
    <div class="cal-consumed"><span id="total-cal">0</span></div>
    <div class="cal-unit">kcal consumed today</div>
    <div class="cal-remaining">
      <span class="rem-pill" id="rem-pill">2,000 left</span>
      <span class="rem-text">of <span id="goal-display">2,000</span> kcal goal</span>
    </div>
  </div>
</div>

<!-- Macros -->
<div class="macros">
  <div class="macro-card">
    <div class="macro-val" id="macro-protein">0g</div>
    <div class="macro-lbl">Protein</div>
    <div class="macro-bar"><div class="macro-fill" id="bar-protein" style="width:0%"></div></div>
  </div>
  <div class="macro-card">
    <div class="macro-val" id="macro-carbs">0g</div>
    <div class="macro-lbl">Carbs</div>
    <div class="macro-bar"><div class="macro-fill" id="bar-carbs" style="width:0%;background:#EF9F27"></div></div>
  </div>
  <div class="macro-card">
    <div class="macro-val" id="macro-fat">0g</div>
    <div class="macro-lbl">Fat</div>
    <div class="macro-bar"><div class="macro-fill" id="bar-fat" style="width:0%;background:#B5D4F4"></div></div>
  </div>
</div>

<!-- Meals -->
<div class="section">
  <div class="section-header">
    <span class="section-title">Today's meals</span>
    <span class="meal-count" id="meal-count">0 logged</span>
  </div>
  <div class="date-badge">
    <span>📅</span>
    <span id="date-label">Today</span>
  </div>
  <div class="meal-list" id="meal-list">
    <div class="empty-state">
      <div class="empty-icon">🍽</div>
      <div>No meals logged yet.<br>Tap the button below to start!</div>
    </div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="log-btn" onclick="openModal()">+ Log a meal</button>
</div>

<!-- Log Meal Modal -->
<div class="modal-backdrop" id="modal" onclick="closeOnBackdrop(event, 'modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Log a meal</div>
    <div class="input-group">
      <label class="input-label">Meal name</label>
      <input class="input-field" id="meal-name" type="text" placeholder="e.g. Grilled chicken & rice" />
    </div>
    <div class="input-group">
      <label class="input-label">Calories (kcal)</label>
      <input class="input-field" id="meal-cal" type="number" placeholder="e.g. 450" inputmode="numeric" />
    </div>
    <div class="input-group">
      <label class="input-label">Quick add</label>
      <div class="quick-foods" id="quick-foods"></div>
    </div>
    <button class="modal-add-btn" onclick="addMeal()">Add meal</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal-backdrop" id="settings-modal" onclick="closeOnBackdrop(event, 'settings-modal')">
  <div class="settings-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Daily calorie goal</div>
    <div class="goal-display" id="goal-preview">2,000</div>
    <div class="goal-sub">kcal per day</div>
    <input type="range" class="goal-slider" id="goal-slider" min="1200" max="4000" step="50" value="2000" oninput="updateGoalPreview(this.value)" />
    <div class="goal-range-labels"><span>1,200</span><span>4,000</span></div>
    <br/>
    <button class="modal-add-btn" onclick="saveGoal()">Save goal</button>
    <br/><br/>
    <button class="modal-add-btn" onclick="clearDay()" style="background:#1a1a18;border:1px solid rgba(226,75,74,0.4);color:#E24B4A;">Clear today's meals</button>
  </div>
</div>

<script>
const QUICK_FOODS = [
  { name: 'Eggs & toast', cal: 380, p: 22, c: 38, f: 14 },
  { name: 'Protein bar', cal: 220, p: 20, c: 22, f: 7 },
  { name: 'Rice & chicken', cal: 520, p: 42, c: 55, f: 10 },
  { name: 'Banana', cal: 105, p: 1, c: 27, f: 0 },
  { name: 'Greek yogurt', cal: 130, p: 17, c: 9, f: 3 },
  { name: 'Burger', cal: 650, p: 35, c: 48, f: 32 },
  { name: 'Salad', cal: 180, p: 8, c: 14, f: 10 },
  { name: 'Protein shake', cal: 160, p: 30, c: 6, f: 3 },
];

function getToday() { return new Date().toDateString(); }

function loadState() {
  const raw = localStorage.getItem('caltrack_v1');
  const state = raw ? JSON.parse(raw) : {};
  if (state.date !== getToday()) {
    return { date: getToday(), meals: [], goal: state.goal || 2000 };
  }
  return state;
}

function saveState(state) {
  localStorage.setItem('caltrack_v1', JSON.stringify(state));
}

let state = loadState();

function render() {
  const totalCal = state.meals.reduce((s, m) => s + m.cal, 0);
  const totalP = state.meals.reduce((s, m) => s + (m.p || 0), 0);
  const totalC = state.meals.reduce((s, m) => s + (m.c || 0), 0);
  const totalF = state.meals.reduce((s, m) => s + (m.f || 0), 0);
  const pct = Math.min(100, Math.round((totalCal / state.goal) * 100));
  const remaining = Math.max(0, state.goal - totalCal);
  const circumference = 251.3;
  const offset = circumference - (pct / 100) * circumference;

  document.getElementById('total-cal').textContent = totalCal.toLocaleString();
  document.getElementById('ring-pct').textContent = pct + '%';
  document.getElementById('ring-arc').style.strokeDashoffset = offset;
  document.getElementById('ring-arc').style.stroke = pct >= 100 ? '#E24B4A' : '#EF9F27';
  document.getElementById('rem-pill').textContent = remaining.toLocaleString() + ' left';
  document.getElementById('goal-display').textContent = state.goal.toLocaleString();
  document.getElementById('macro-protein').textContent = totalP + 'g';
  document.getElementById('macro-carbs').textContent = totalC + 'g';
  document.getElementById('macro-fat').textContent = totalF + 'g';
  document.getElementById('bar-protein').style.width = Math.min(100, (totalP / (state.goal * 0.075)) * 100) + '%';
  document.getElementById('bar-carbs').style.width = Math.min(100, (totalC / (state.goal * 0.175)) * 100) + '%';
  document.getElementById('bar-fat').style.width = Math.min(100, (totalF / (state.goal * 0.075)) * 100) + '%';
  document.getElementById('meal-count').textContent = state.meals.length + ' logged';

  const list = document.getElementById('meal-list');
  if (state.meals.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🍽</div><div>No meals logged yet.<br>Tap the button below to start!</div></div>';
  } else {
    list.innerHTML = state.meals.map((m, i) => `
      <div class="meal-item">
        <div class="meal-dot"></div>
        <span class="meal-name">${m.name}</span>
        <span class="meal-cal">${m.cal} kcal</span>
        <button class="meal-delete" onclick="deleteMeal(${i})" aria-label="Delete">✕</button>
      </div>
    `).join('');
  }

  const h = new Date().getHours();
  document.getElementById('greeting').textContent = h < 12 ? 'Good morning,' : h < 18 ? 'Good afternoon,' : 'Good evening,';
  const d = new Date();
  document.getElementById('date-label').textContent = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function openModal() {
  document.getElementById('meal-name').value = '';
  document.getElementById('meal-cal').value = '';
  const qf = document.getElementById('quick-foods');
  qf.innerHTML = QUICK_FOODS.map(f =>
    `<div class="quick-chip" onclick="quickAdd('${f.name}', ${f.cal}, ${f.p}, ${f.c}, ${f.f})">${f.name} · ${f.cal}</div>`
  ).join('');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('meal-name').focus(), 300);
}

function quickAdd(name, cal, p, c, f) {
  state.meals.push({ name, cal, p, c, f });
  saveState(state);
  render();
  document.getElementById('modal').classList.remove('open');
}

function addMeal() {
  const name = document.getElementById('meal-name').value.trim();
  const cal = parseInt(document.getElementById('meal-cal').value);
  if (!name || isNaN(cal) || cal <= 0) return;
  state.meals.push({ name, cal, p: 0, c: 0, f: 0 });
  saveState(state);
  render();
  document.getElementById('modal').classList.remove('open');
}

function deleteMeal(i) {
  state.meals.splice(i, 1);
  saveState(state);
  render();
}

function openSettings() {
  document.getElementById('goal-slider').value = state.goal;
  document.getElementById('goal-preview').textContent = state.goal.toLocaleString();
  document.getElementById('settings-modal').classList.add('open');
}

function updateGoalPreview(val) {
  document.getElementById('goal-preview').textContent = parseInt(val).toLocaleString();
}

function saveGoal() {
  state.goal = parseInt(document.getElementById('goal-slider').value);
  saveState(state);
  render();
  document.getElementById('settings-modal').classList.remove('open');
}

function clearDay() {
  if (confirm('Clear all meals for today?')) {
    state.meals = [];
    saveState(state);
    render();
    document.getElementById('settings-modal').classList.remove('open');
  }
}

function closeOnBackdrop(e, id) {
  if (e.target.id === id) document.getElementById(id).classList.remove('open');
}

document.getElementById('meal-cal').addEventListener('keydown', e => { if (e.key === 'Enter') addMeal(); });
document.getElementById('meal-name').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('meal-cal').focus(); });

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
